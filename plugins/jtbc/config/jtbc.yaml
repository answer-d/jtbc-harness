name: jtbc
displayName: 日本の伝統的大企業モード
description: |
  AIエージェントによるソフトウェア開発に、5階層の役職構造(+外注SES)、
  フェーズゲート、稟議による承認フロー、各種会議体、インシデント対応を
  適用するモード。本プラグインは JTBC 専用であり、他モードは持たない。
  目的は AI の暴走防止・要件逸脱防止・設計品質向上・意思決定の記録・組織的開発。

roles:
  - shacho   # 社長
  - bucho    # 部長
  - kacho    # 課長
  - shunin   # 主任
  - tantou   # 担当
  - ses      # 外注SES (低コストモデル)

agent_name_map:
  shacho: jtbc-shacho
  bucho: jtbc-bucho
  kacho: jtbc-kacho
  shunin: jtbc-shunin
  tantou: jtbc-tantou
  ses: jtbc-ses

# 客対窓口(営業)。メインセッション(司令塔)がお客様に応対するときに名乗る人格。
# - 開発組織(roles)の **外側** に立つ窓口。承認権限を持たず、ガバナンス文書も起案しない。
# - **teammate 化しない(lead 固定)**。お客様との逐次対話(1問ずつのヒアリング・ご承認の往復)を
#   担うため、メインセッション(=チームの lead)自身が「営業」として応対する。
#   裏方の起案・審査・承認は課長以下の役職(常駐 teammate / 無効環境ではサブエージェント)が担う
#   (司令塔がオーケストレーション)。
# - 営業は客対の一次窓口。**重要局面(客先設計レビューの技術説明・インシデント謝罪等)では
#   課長・部長を「弊社PM/責任者」として同席紹介** し、その役職の言葉を客前で述べる。
customer_window:
  persona: eigyo                          # 営業(窓口担当)= メインセッションの客対人格
  is_subagent: false                      # jtbc-* の teammate/サブエージェントではない(チームの lead=メインセッションが務める)
  approval_authority: false               # 承認・起案の権限なし(開発組織の外側)
  escorts_at_key_moments: [kacho, bucho]  # 重要局面で同席・紹介する役職(課長=PM / 部長=責任者)

# 工程フェーズ。*_REVIEW は審査会(ゲート)開催中の一時状態。
phases:
  - PROPOSAL              # 提案
  - PROPOSAL_REVIEW       # 提案審査
  - REQUIREMENTS          # 要件定義
  - PROJECT_PLAN_REVIEW   # PJ計画審査
  - BASIC_DESIGN          # 基本設計
  - BASIC_DESIGN_REVIEW   # 基本設計審査
  - DETAILED_DESIGN       # 詳細設計
  - DETAILED_DESIGN_REVIEW # 詳細設計審査
  - IMPLEMENTATION        # 実装
  - UNIT_TEST             # 単体テスト
  - INTEGRATION_TEST      # 総合テスト
  - RELEASE_REVIEW        # リリース判定会
  - RELEASED              # リリース済
  - COMPLETION_REVIEW     # PJ完了審査
  - COMPLETED             # 完了

# ゲート(審査会)。
# ◎ owner = 招集・進行・起案責任者(成果物を起案する役職)。
# approvers = owner の起案を審査・承認するレビュー者(○)。
# reviewers = 承認印は押さないが、事前レビュー・記載協力で審査に関与する役職(任意)。
# 【自己レビュー禁止】owner は自分が起案した成果物の承認者にならない。
#   起案者(owner)は approvers に含めない。これにより「作成者≠承認者」を担保する。
#   (旧仕様の owner 自己承認は廃止。)
# 【承認は起案者より上位のみ(重要)】役職の上下は roles の並び順
#   (社長 > 部長 > 課長 > 主任 > 担当 > 外注SES)。**承認(押印)できるのは
#   起案者(owner)より上位の役職に限る。** 起案者と同位・下位の役職は approvers に
#   含めない。下位役職が上位の起案を承認する不自然(例: 課長起案の計画書を主任が承認)を
#   排除する。下位役職に事前レビュー・記載協力をさせたいときは approvers ではなく
#   reviewers に置く(関与はするが承認印は押さない)。この原則はゲート/稟議/文書承認の
#   すべてに共通する。
#
# 【承認と客先提示の順序(重要)】
#   内部承認(社内審査会=ゲート)を **先に** 行い、上位承認を得てから成果物をお客様へ提示する。
#   内部承認前の文書をお客様に出してはならない。発動の起点はユーザー操作ではなく
#   司令塔(governance スキル)の自動判断。したがって:
#     1. owner が成果物を起案
#     2. 内部審査(司令塔が自動開催) … 社内審査会で承認者が承認(= 上位承認 / 客先提示の前提)
#     3. 客先提示(内部承認に続けて自動発火) … 内部承認済みの成果物をお客様へ提示し、ご承認を賜る
#   ※ 旧 /jtbc:gate コマンドは撤去済み(お客様にベンダー社内の審査を操作させない)。
#
# client_review を持つゲート(proposal/project_plan/basic_design/detailed_design)は、
#   内部承認では phase を進めず、客先提示でお客様のご承認(APPROVED)を得た時点で
#   phase を next_phase へ進める。internal_approval_first: true がその目印。
# client_review を持たないゲート(release/completion)は内部審査の承認で直接 phase を進める
#   (お客様対応は別途、客先向け会議・検収で実施)。
#
# client_review: 内部承認後にお客様へ成果物を提示し、確認・ご承認を得る工程(自動発火)。
#   営業(窓口=メインセッション)が成果物のパスを示して「ご査収ください」と提示する
#   (重要局面では課長を同席紹介)。内部承認が未完了の間は客先提示を実施できない(機械チェック)。
gates:
  proposal:                       # 提案審査
    previous_phase: PROPOSAL
    review_phase: PROPOSAL_REVIEW
    next_phase: REQUIREMENTS
    owner: kacho
    internal_approval_first: true # 内部承認(gate)→ 客先提示(client-review)→ phase 遷移
    required_documents: [proposal]
    approvers: [bucho, shacho]    # 起案者 kacho は自己レビューしないため除外
    client_review:                # 内部承認後にお客様へ提示する客先レビュー
      reviews: 提案内容・プロジェクト計画方針
      documents: [proposal]
      facilitator: kacho
      record_document: client_review
      outcomes: [APPROVED, REVISION_REQUESTED]
  project_plan:                   # PJ計画審査
    previous_phase: REQUIREMENTS
    review_phase: PROJECT_PLAN_REVIEW
    next_phase: BASIC_DESIGN
    owner: kacho
    internal_approval_first: true # 内部承認(gate)→ 客先提示(client-review)→ phase 遷移
    required_documents: [project_plan, requirements, risk_register]
    approvers: [bucho]            # 起案者 kacho より上位のみ(社長は本ゲート不在のため部長が承認)
    reviewers: [shunin]           # 主任は WBS実現性の事前レビュー・記載協力で関与(承認印は押さない)
    client_review:                # 内部承認後にお客様へ提示する客先レビュー
      reviews: 要件定義書
      documents: [requirements]
      facilitator: kacho
      record_document: client_review
      outcomes: [APPROVED, REVISION_REQUESTED]
  basic_design:                   # 基本設計審査
    previous_phase: BASIC_DESIGN
    review_phase: BASIC_DESIGN_REVIEW
    next_phase: DETAILED_DESIGN
    owner: kacho
    internal_approval_first: true # 内部承認(gate)→ 客先提示(client-review)→ phase 遷移
    required_documents: [basic_design, issue_log]
    approvers: [bucho]            # 起案者 kacho を除外(部長が承認)
    client_review:                # 内部承認後にお客様へ提示する客先レビュー
      reviews: 基本設計書
      documents: [basic_design]
      facilitator: kacho
      record_document: client_review
      outcomes: [APPROVED, REVISION_REQUESTED]
  detailed_design:                # 詳細設計審査
    previous_phase: DETAILED_DESIGN
    review_phase: DETAILED_DESIGN_REVIEW
    next_phase: IMPLEMENTATION
    owner: shunin
    internal_approval_first: true # 内部承認(gate)→ 客先提示(client-review)→ phase 遷移
    required_documents: [detailed_design, wbs, test_plan]
    approvers: [kacho, bucho]     # 起案者 shunin を除外(課長・部長が承認)
    client_review:                # 内部承認後にお客様へ提示する客先レビュー
      reviews: 詳細設計書
      documents: [detailed_design]
      facilitator: kacho
      record_document: client_review
      outcomes: [APPROVED, REVISION_REQUESTED]
  release:                        # リリース判定会
    previous_phase: INTEGRATION_TEST
    review_phase: RELEASE_REVIEW
    next_phase: RELEASED
    owner: kacho
    required_documents: [test_report, deliverables_list]
    approvers: [bucho, shacho]    # 起案者 kacho より上位のみ(主任は下位のため承認者から除外)
    reviewers: [shunin]           # 主任はテスト結果・残課題の事前レビューで関与(承認印は押さない)
  completion:                     # PJ完了審査
    previous_phase: RELEASED
    review_phase: COMPLETION_REVIEW
    next_phase: COMPLETED
    owner: kacho
    required_documents: [lessons_learned, completion_approval]
    approvers: [bucho, shacho]    # 起案者 kacho を除外
    extra_requirements:
      lessons_min_approved: 3

# ゲートを伴わない工程内遷移。実装→単体テスト→総合テストは主任が完了を確認したら
# 司令塔(governance)が自動で進める(お客様の操作は不要。専用コマンドは持たない)。
linear_transitions:
  - {from: IMPLEMENTATION, to: UNIT_TEST, owner: shunin}
  - {from: UNIT_TEST, to: INTEGRATION_TEST, owner: shunin}

ringi_required_for:
  - requirement_change
  - design_change
  - tech_stack_change
  - scope_change
  - effort_increase

# 稟議の承認経路(回覧順)。起案者(CRを起票・影響分析する役職)は承認者に含めない
# (起案者≠承認者。gate と同じ思想)。**承認は起案者より上位の役職のみ**(上掲の原則と共通)。
# 技術系CR(requirement/design/tech_stack/effort)は主任が起案するため主任を除外、
# scope は課長が起案するため課長を除外する。いずれも残る承認者は起案者より上位のみで構成される。
# 起案者は frontmatter の created_by に記録し、承認パスには現れない。
ringi_workflow:
  requirement: [kacho, bucho, shacho]   # 起案者 shunin を除外
  design:      [kacho, bucho]           # 起案者 shunin を除外
  tech_stack:  [kacho, bucho]           # 起案者 shunin を除外
  scope:       [bucho, shacho]          # 起案者 kacho を除外
  effort:      [kacho, bucho]           # 起案者 shunin を除外

# 会議体。frequency: high|medium|low、audience: internal|client。
events:
  recurring:
    project_internal_standup:     # プロジェクト内部定例
      display: プロジェクト内部定例
      facilitator: shunin
      participants: [kacho, tantou, ses]
      audience: internal
      frequency: high
      minutes_required: true
    client_regular_meeting:       # プロジェクト客先定例
      display: プロジェクト客先定例
      facilitator: eigyo          # 営業(窓口)が進行。課長は弊社PMとして同席・報告
      participants: [user, kacho, shunin, tantou]
      audience: client
      frequency: medium
      minutes_required: true
    internal_status_review:       # 社内プロジェクト状況報告定例
      display: 社内プロジェクト状況報告定例
      facilitator: kacho
      participants: [bucho, shunin, tantou]
      audience: internal
      frequency: medium
      minutes_required: true
      corrective_action_owner: kacho
    board_meeting:                # 社内役員会議
      display: 社内役員会議
      facilitator: bucho
      participants: [shacho]
      audience: internal
      frequency: low
      minutes_required: true
  event_driven:
    client_incident_meeting:      # 客先報告会議
      display: 客先報告会議
      facilitator: eigyo          # 営業(窓口)が進行。重要局面のため課長・部長を同席紹介
      participants: [kacho, bucho, shunin, tantou]
      audience: client
      trigger: issue_or_incident
      minutes_required: true
  random:
    superior_visit:               # 上長視察
      display: 上長視察
      actors: [shacho, bucho]
      targets: [kacho, shunin]
      probability:
        shacho: very_rare         # 社長: ごく稀
        bucho: rare               # 部長: 稀
      effect: subordinates_become_formal

# インシデント対応。社内ルール違反・作業中の事故を検知したら発動。
incident:
  triggers:
    - company_rule_violation      # 社内規程違反
    - work_accident               # 作業中の事故(テスト破壊/データ消失/誤デプロイ等)
  flow:
    - immediate_report_to_user    # 1. まずユーザーへ緊急一報
    - periodic_status_report      # 2. 解決まで部長/課長が定期状況報告
    - root_cause_analysis         # 3. 根本原因分析(なぜなぜ分析)
    - incident_report_to_user     # 4. 障害報告書(顛末+再発防止策)をユーザーへ提出
  status_reporter: [bucho, kacho]
  apology_by: [bucho, kacho]      # 重篤時は部長+課長で謝罪
  rca_method: naze_naze
  closing_document: incident_report

deliverables_minimum:
  - source_code
  - proposal
  - project_plan
  - requirements
  - basic_design
  - detailed_design
  - wbs
  - test_plan
  - test_report
  - release_note
  - lessons_learned
  - completion_approval

documents_required: ["00", "01", "02", "03", "04", "05", "06", "07", "09", "10", "11", "12", "13"]

policies:
  buffer_minimum_pct: 20
  budget_buffer_pct: 10
  lessons_minimum: 3
  enforce_traceability: true
  src_writable_phases: [IMPLEMENTATION, UNIT_TEST, INTEGRATION_TEST]
  # 追加要員(担当/外注SES)の払い出しは部長承認が必要
  headcount_change_approver: bucho
